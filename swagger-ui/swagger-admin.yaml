        name: shipping
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: integer
      - in: query
        name: total
        schema:
          type: number
      - in: query
        name: total_max
        schema:
          type: number
      - in: query
        name: total_min
        schema:
          type: number
      - in: query
        name: type
        schema:
          type: string
      - in: query
        name: user_id
        schema:
          type: integer
      - in: query
        name: uses_customer
        schema:
          type: string
      - in: query
        name: uses_total
        schema:
          type: integer
      tags:
      - Admin - Coupons
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOcAdminCouponList'
          description: ''
    post:
      operationId: admin_coupons_create
      description: |
        Create a new coupon.

        Key fields:
        - type: one-letter code defining behavior (see choices).
        - discount: percentage for percentage types; IQD amount for fixed types.
        - total_min/total_max: optional cart bounds in IQD.
        - uses_total/uses_customer: optional usage limits.
        - products/categories/brands: limit applicability (for product and delivery scoped types).
        Behavior notes:
        - Delivery-only types (D/Z) waive delivery cost.
        - X adds free delivery to a percentage discount; C adds free delivery to a fixed discount.
        - First-order types (H/Z) are valid only if the customer has no prior valid orders.
      summary: Create coupon
      tags:
      - Admin - Coupons
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OcAdminCoupon'
            examples:
              PercentageCoupon:
                value:
                  name: Autumn Sale
                  code: AUTUMN10
                  type: P
                  discount: '10'
                  total_min: '50000'
                  uses_total: 1000
                  status: 1
                  date_start: '2025-10-01T00:00:00Z'
                  date_end: '2025-10-31T23:59:59Z'
                summary: Percentage Coupon
                description: 10% off any order over IQD 50,000
              ProductPercentage:
                value:
                  name: Headphones 20
                  code: HP20
                  type: A
                  discount: '20'
                  products:
                  - 123
                  - 456
                  status: 1
                summary: Product Percentage
                description: 20% off specific products
              Fixed+FreeDelivery:
                value:
                  name: Cat Saver
                  code: CAT5000
                  type: C
                  discount: '5000'
                  categories:
                  - 10
                  - 20
                  status: 1
                summary: Fixed + Free Delivery
                description: IQD 5,000 off + free delivery on categories
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OcAdminCoupon'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OcAdminCoupon'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OcAdminCoupon'
              examples:
                PercentageCoupon:
                  value:
                    name: Autumn Sale
                    code: AUTUMN10
                    type: P
                    discount: '10'
                    total_min: '50000'
                    uses_total: 1000
                    status: 1
                    date_start: '2025-10-01T00:00:00Z'
                    date_end: '2025-10-31T23:59:59Z'
                  summary: Percentage Coupon
                  description: 10% off any order over IQD 50,000
                ProductPercentage:
                  value:
                    name: Headphones 20
                    code: HP20
                    type: A
                    discount: '20'
                    products:
                    - 123
                    - 456
                    status: 1
                  summary: Product Percentage
                  description: 20% off specific products
                Fixed+FreeDelivery:
                  value:
                    name: Cat Saver
                    code: CAT5000
                    type: C
                    discount: '5000'
                    categories:
                    - 10
                    - 20
                    status: 1
                  summary: Fixed + Free Delivery
                  description: IQD 5,000 off + free delivery on categories
          description: ''
