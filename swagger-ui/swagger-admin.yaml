      description: Creates a product and optionally attaches multilingual descriptions
        and categories. For `application/json`, send `description` and `categories`
        as arrays. For `multipart/form-data`, send them as JSON strings.
      summary: Create product
      tags:
      - products_admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
            examples:
              CreateProduct(JSON):
                value:
                  model: XYZ123
                  available_quantity: 100
                  price: '29.9900'
                  status: 4
                  manufacturer_id: 5
                  max_cart_quantity: 3
                  notes: Admin note
                  description:
                  - language_id: 1
                    name: A fine product
                    description: A fine product
                  - language_id: 2
                    name: Excellent product
                    description: Localized description
                  categories:
                  - 12
                  - 25
                summary: Create product (JSON)
              CreateProduct(multipartFields):
                value:
                  model: XYZ123
                  available_quantity: 100
                  price: '29.9900'
                  status: 4
                  description: '[{"language_id":1,"name":"A fine product","description":"A
                    fine product"}]'
                  categories: '[12,25]'
                summary: Create product (multipart fields)
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProduct'
          description: ''
