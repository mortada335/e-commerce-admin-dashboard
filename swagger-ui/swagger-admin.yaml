          nullable: true
          description: Legacy field; not used.
        status:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: 'Coupon status: 1=ENABLED, 0=DISABLED (2=EXPIRED is set automatically).'
        point_coupon:
