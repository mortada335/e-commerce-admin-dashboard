components:
  schemas:
    ActionEnum:
      enum:
      - 0
      - 1
      - 2
      - 3
      type: integer
      description: |-
        * `0` - create
        * `1` - update
        * `2` - delete
        * `3` - access
    AddAttribute:
      type: object
      properties:
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/AddAttributeDescription'
        attribute_group_id:
          type: integer
      required:
      - attribute_group_id
      - attributes
    AddAttributeDescription:
      type: object
      properties:
        language_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        name:
          type: string
          maxLength: 64
        attribute_id:
          type: string
          readOnly: true
      required:
      - attribute_id
      - language_id
    AddressTypeEnum:
      enum:
      - 0
      - 1
      - 2
      type: integer
      description: |-
        * `0` - Home
        * `1` - Work
        * `2` - Other
    AdminAudit:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        actor_name:
          type: string
          readOnly: true
        object_pk:
          type: string
          maxLength: 255
        object_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        object_repr:
          type: string
          title: Object representation
        serialized_data:
          nullable: true
        action:
          allOf:
          - $ref: '#/components/schemas/ActionEnum'
          minimum: 0
          maximum: 65535
        changes_text:
          type: string
          title: Change message
        changes:
          nullable: true
          title: Change message
        cid:
          type: string
          nullable: true
          title: Correlation ID
          maxLength: 255
        remote_addr:
          type: string
          nullable: true
          title: Remote address
        remote_port:
          type: integer
          maximum: 4294967295
          minimum: 0
          format: int64
          nullable: true
        timestamp:
          type: string
          format: date-time
        additional_data:
          nullable: true
        actor_email:
          type: string
          nullable: true
          maxLength: 254
        content_type:
          type: integer
        actor:
          type: integer
          nullable: true
      required:
      - action
      - actor_name
      - content_type
      - id
      - object_pk
      - object_repr
    AdminChatConversation:
      type: object
      properties:
        user_id:
          type: integer
          readOnly: true
        full_name:
          type: string
          readOnly: true
        preview:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - full_name
      - preview
      - user_id
    AdminDashboardUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        permissions:
          type: string
          readOnly: true
        last_name:
          type: string
          maxLength: 150
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
        user_login_details:
          type: string
          readOnly: true
        user_groups:
          type: string
          readOnly: true
