    PatchedOcAdminCoupon:
      type: object
      description: Base serializer for OcCoupon with shared documentation.
      properties:
        coupon_id:
          type: integer
          readOnly: true
        type:
          allOf:
          - $ref: '#/components/schemas/OcAdminCouponTypeEnum'
          description: |-
            Coupon type code: D=Free Delivery, Z=Free Delivery (First Order), H=Percentage (First Order), F=Points Coupon (fixed amount), P=Percentage Coupon, X=Percentage + Free Delivery, C=Fixed Discount + Free Delivery, A=Product Percentage, B=Product Fixed Discount, Y=Product Free Delivery

            * `D` - Free Delivery
            * `Z` - Free Delivery First Order
            * `H` - Percentage First Order
            * `F` - Points Coupon
            * `P` - Percentage Coupon
            * `X` - Percentage and free delivery Coupon
            * `C` - Discount and free delivery coupon
            * `A` - Product Percentage Coupon
            * `B` - Product Fixed Discount Coupon
            * `Y` - Product FREE DELIVERY
        discount:
          type: string
          format: decimal
          pattern: ^-?\d{0,11}(?:\.\d{0,4})?$
          description: Discount value. For percentage types (P/H/X/A), set percentage
            (e.g., 10 = 10%). For fixed types (F/C/B), set amount in IQD. For delivery
            types (D/Z/Y), discount is ignored unless combined type (C/X).
        total_min:
          type: string
          format: decimal
          pattern: ^-?\d{0,11}(?:\.\d{0,4})?$
          nullable: true
          description: Optional minimum cart total (IQD) required to use the coupon.
        total_max:
          type: string
          format: decimal
          pattern: ^-?\d{0,11}(?:\.\d{0,4})?$
          nullable: true
          description: Optional maximum cart total (IQD) allowed to use the coupon.
        uses_total:
          type: integer
          nullable: true
          description: 'Coupon type code: D=Free Delivery, Z=Free Delivery (First
            Order), H=Percentage (First Order), F=Points Coupon (fixed amount), P=Percentage
            Coupon, X=Percentage + Free Delivery, C=Fixed Discount + Free Delivery,
            A=Product Percentage, B=Product Fixed Discount, Y=Product Free Delivery'
        uses_customer:
          type: string
          nullable: true
          description: Optional per-customer usage limit. For points coupon (F), reaching
            the per-customer limit marks the coupon expired.
        products:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
        products_detail:
          type: string
          readOnly: true
        categories:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
        categories_detail:
          type: string
          readOnly: true
        brands:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
        brands_detail:
          type: string
          readOnly: true
        name:
          type: string
          description: Internal name for the coupon (shown in admin).
          maxLength: 128
        code:
          type: string
          description: Unique coupon code customers will enter at checkout.
          maxLength: 20
        logged:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          description: Legacy field; not used.
        shipping:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          description: Legacy field; not used.
        total:
          type: string
          format: decimal
