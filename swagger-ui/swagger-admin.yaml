                $ref: '#/components/schemas/PaginatedPopupList'
          description: ''
    post:
      operationId: popups_create
      description: |-
        Create a popup.

        **Multipart/Form-Data Instructions:**
        - `translations`: Send as a **JSON string**. Example: `[{"text":"Hello","language":1}]`
        - `image_{index}`: Upload images corresponding to the translation index. Example: `image_0` for the first translation.
      tags:
      - popups
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                translations:
                  type: string
                  example: '[{"text":"Title","language":1}]'
                type:
                  type: string
                type_id:
                  type: integer
                active:
                  type: boolean
                is_dismissible:
                  type: boolean
                start_at:
                  type: string
                  format: date-time
                end_at:
                  type: string
                  format: date-time
                image_0:
                  type: string
                  format: binary
                image_1:
                  type: string
                  format: binary
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Popup'
          description: ''
